<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Heart @fenidev</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instructions {
            position: absolute;
            top: 20px; width: 100%;
            text-align: center; color: #ff69b4;
            font-family: 'Arial', sans-serif;
            text-shadow: 0 0 10px #ff69b4;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">Usa el ratón para girar la magia</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com",
                "three/addons/": "https://unpkg.com"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. ESCENA Y CONFIGURACIÓN
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. CREACIÓN DEL CORAZÓN (Ecuación paramétrica)
        const heartGroup = new THREE.Group();
        const heartPoints = [];
        const totalPoints = 2500; // Más densidad

        for (let i = 0; i < totalPoints; i++) {
            const t = Math.random() * Math.PI * 2;
            // Ecuación clásica del corazón
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            
            // Esparcimiento aleatorio para volumen 3D
            const z = (Math.random() - 0.5) * 5;
            heartPoints.push(new THREE.Vector3(x * 0.15, y * 0.15, z * 0.1));
        }

        const heartGeometry = new THREE.BufferGeometry().setFromPoints(heartPoints);
        const heartMaterial = new THREE.PointsMaterial({ 
            size: 0.06, 
            color: 0xff0066, 
            transparent: true, 
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const heartMesh = new THREE.Points(heartGeometry, heartMaterial);
        heartGroup.add(heartMesh);
        scene.add(heartGroup);

        // 3. GALAXIA DE ESTRELLAS DE FONDO
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 4000;
        const posArray = new Float32Array(starsCount * 3);

        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 40;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ 
            size: 0.02, 
            color: 0xffffff,
            transparent: true,
            opacity: 0.5
        });
        const starsMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starsMesh);

        camera.position.z = 8;

        // 4. BUCLE DE ANIMACIÓN
        function animate() {
            const t = clock.getElapsedTime();
            requestAnimationFrame(animate);

            // Rotación constante
            heartGroup.rotation.y = t * 0.4;
            starsMesh.rotation.y = t * 0.05;

            // Efecto de latido (Scaling)
            const pulse = 1 + Math.abs(Math.sin(t * 2.5)) * 0.15;
            heartGroup.scale.set(pulse, pulse, pulse);

            // Movimiento flotante
            heartGroup.position.y = Math.sin(t) * 0.3;

            controls.update();
            renderer.render(scene, camera);
        }

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
